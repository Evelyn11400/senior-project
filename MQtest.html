<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MQTT chat test (HiveMQ WebSocket)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600&family=Orbitron:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1419;
        --surface: #1a2332;
        --border: #2d3a4d;
        --text: #e7ecf3;
        --muted: #8b9cb3;
        --in-bg: #243044;
        --out-bg: #1e3d32;
        --out-accent: #3ecf8e;
        --err: #f07178;
        --warn: #e6c07b;
        --ok: #7fd962;
        font-family: "Exo 2", system-ui, "Segoe UI", sans-serif;
        line-height: 1.45;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        max-width: 42rem;
        margin-inline: auto;
      }
      header {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      header h1 {
        font-size: 1rem;
        font-weight: 600;
        margin: 0 0 0.35rem;
      }
      .hint {
        font-size: 0.75rem;
        color: var(--muted);
        margin: 0;
      }
      button {
        padding: 0.45rem 0.75rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 0.85rem;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        border-color: var(--muted);
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      button.primary {
        background: #2d4a3e;
        border-color: #3d6b5a;
      }
      .status-bar {
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 1rem;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .pill.disconnected {
        background: #333;
        color: var(--muted);
      }
      .pill.connecting {
        background: #3a3520;
        color: var(--warn);
      }
      .pill.connected {
        background: #1e3328;
        color: var(--ok);
      }
      .pill.error {
        background: #3a2224;
        color: var(--err);
      }
      .pill i {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.9;
      }
      .status-detail {
        flex: 1;
        min-width: 12rem;
        color: var(--muted);
        font-family: ui-monospace, Consolas, monospace;
        font-size: 0.72rem;
        word-break: break-all;
      }
      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 0.75rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }
      .msg {
        max-width: 88%;
        padding: 0.55rem 0.75rem;
        border-radius: 12px;
        font-size: 0.9rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .msg.in {
        align-self: flex-start;
        background: var(--in-bg);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .msg.out {
        align-self: flex-end;
        background: var(--out-bg);
        border: 1px solid rgba(62, 207, 142, 0.35);
        border-bottom-right-radius: 4px;
      }
      .msg .meta {
        font-size: 0.65rem;
        color: var(--muted);
        margin-bottom: 0.25rem;
        font-family: ui-monospace, Consolas, monospace;
      }
      .msg .ack {
        font-weight: 600;
      }
      .msg .ack.pending {
        color: var(--warn);
      }
      .msg .ack.ok {
        color: var(--ok);
      }
      .msg .ack.fail {
        color: var(--err);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        padding: 0.5rem 1rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .toolbar button {
        font-size: 0.8rem;
      }
      .msg.system {
        align-self: center;
        max-width: 95%;
        background: transparent;
        border: 1px dashed var(--border);
        color: var(--muted);
        font-size: 0.8rem;
        text-align: center;
      }
      .composer {
        padding: 0.65rem 1rem 0.75rem;
        border-top: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        gap: 0.5rem;
        align-items: flex-end;
      }
      .composer textarea {
        flex: 1;
        min-height: 2.5rem;
        max-height: 8rem;
        resize: vertical;
        padding: 0.5rem 0.65rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 0.9rem;
        font-family: inherit;
      }
      .composer button.primary {
        flex-shrink: 0;
        height: 2.5rem;
      }
      details.debug {
        border-top: 1px solid var(--border);
        background: #0a0d11;
      }
      details.debug > summary {
        padding: 0.45rem 1rem;
        font-size: 0.75rem;
        color: var(--muted);
        cursor: pointer;
      }
      details.debug[open] > summary {
        color: var(--warn);
      }
      #debugLog {
        margin: 0;
        padding: 0 1rem 0.75rem;
        max-height: min(28vh, 220px);
        overflow-y: auto;
        font-family: ui-monospace, Consolas, monospace;
        font-size: 0.68rem;
        line-height: 1.5;
        color: #b8c5d6;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .debug-line.err {
        color: var(--err);
      }
      .debug-line.warn {
        color: var(--warn);
      }
      .debug-line.ok {
        color: #98c379;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>MQTT chat test</h1>
      <p class="hint">
        Connects automatically to HiveMQ over <strong>WebSocket</strong>. Use http(s), not
        <code>file://</code>. Green check on your message = broker acknowledged (QoS&nbsp;1 PUBACK).
      </p>
    </header>

    <div class="toolbar">
      <button type="button" id="btnReconnect">Reconnect</button>
      <button type="button" id="btnClearChat">Clear chat</button>
    </div>

    <div class="status-bar">
      <span class="pill disconnected" id="pill"><i></i> <span id="pillText">Disconnected</span></span>
      <span class="status-detail" id="statusDetail">Not connected</span>
    </div>

    <div id="chat" aria-live="polite"></div>

    <div class="composer">
      <textarea
        id="composerInput"
        rows="2"
        placeholder="Type a message and send (Enter — Shift+Enter for newline)"
        disabled
      ></textarea>
      <button type="button" class="primary" id="btnSend" disabled>Send</button>
    </div>

    <details class="debug" open>
      <summary>Technical log (connection errors, MQTT events)</summary>
      <pre id="debugLog"></pre>
    </details>

    <script
      src="https://cdn.jsdelivr.net/npm/mqtt@5.10.3/dist/mqtt.min.js"
      crossorigin="anonymous"
    ></script>
    <script>
      (function () {
        /** Built-in HiveMQ Cloud WebSocket endpoint (class demo — rotate if exposed). */
        var MQTEST = {
          host: "2ec7c29478854652aefa31c92c09f792.s1.eu.hivemq.cloud",
          wsPort: 8884,
          wsPath: "/mqtt",
          username: "test2",
          password: "Aa123456",
          chatTopic: "blackout/mqtest/chat",
        };
        MQTEST.brokerUrl =
          "wss://" + MQTEST.host + ":" + String(MQTEST.wsPort) + MQTEST.wsPath;

        var client = null;
        var clientId = "";
        var $ = function (id) {
          return document.getElementById(id);
        };
        var chatEl = $("chat");
        var debugEl = $("debugLog");
        var pillEl = $("pill");
        var pillTextEl = $("pillText");
        var statusDetailEl = $("statusDetail");
        var composerInput = $("composerInput");

        function timeStr() {
          return new Date().toISOString().slice(11, 23);
        }

        function redactUrl(u) {
          try {
            var x = new URL(u);
            if (x.password) x.password = "***";
            if (x.username) x.username = x.username ? "***" : "";
            return x.toString();
          } catch (e) {
            return u.replace(/:[^:@/]+@/, ":***@");
          }
        }

        function debugLine(msg, kind) {
          var line = document.createElement("div");
          line.className = "debug-line" + (kind ? " " + kind : "");
          line.textContent = "[" + timeStr() + "] " + msg;
          debugEl.appendChild(line);
          debugEl.scrollTop = debugEl.scrollHeight;
        }

        function setPill(state, detail) {
          pillEl.className = "pill " + state;
          pillTextEl.textContent =
            state === "connected"
              ? "Connected"
              : state === "connecting"
                ? "Connecting…"
                : state === "error"
                  ? "Error"
                  : "Disconnected";
          if (detail != null) statusDetailEl.textContent = detail;
        }

        var lastSentBody = "";
        var lastSentAt = 0;

        function setConnected(on) {
          $("btnSend").disabled = !on;
          composerInput.disabled = !on;
        }

        function errString(err) {
          if (!err) return "(no message)";
          if (typeof err === "string") return err;
          var parts = [];
          if (err.message) parts.push(err.message);
          if (err.code != null) parts.push("code=" + err.code);
          if (err.errno != null) parts.push("errno=" + err.errno);
          if (err.stack && parts.length < 2) parts.push(err.stack.split("\n")[0]);
          return parts.length ? parts.join(" | ") : String(err);
        }

        function appendChat(kind, meta, body) {
          var div = document.createElement("div");
          div.className = "msg " + kind;
          if (kind === "system") {
            div.textContent = body;
          } else {
            var m = document.createElement("div");
            m.className = "meta";
            m.textContent = meta;
            div.appendChild(m);
            var b = document.createElement("div");
            b.textContent = body;
            div.appendChild(b);
          }
          chatEl.appendChild(div);
          chatEl.scrollTop = chatEl.scrollHeight;
        }

        /** Outgoing bubble with ack line updated after QoS 1 PUBACK. */
        function appendOutgoingChat(topic, body) {
          var div = document.createElement("div");
          div.className = "msg out";
          var meta = document.createElement("div");
          meta.className = "meta";
          var ack = document.createElement("span");
          ack.className = "ack pending";
          ack.textContent = "Waiting for broker PUBACK…";
          meta.appendChild(document.createTextNode("You · " + topic + " · "));
          meta.appendChild(ack);
          div.appendChild(meta);
          var b = document.createElement("div");
          b.textContent = body;
          div.appendChild(b);
          chatEl.appendChild(div);
          chatEl.scrollTop = chatEl.scrollHeight;
          return {
            setDelivered: function () {
              ack.className = "ack ok";
              ack.textContent = "Delivered ✓ (broker acknowledged)";
            },
            setFailed: function (msg) {
              ack.className = "ack fail";
              ack.textContent = "Failed — " + (msg || "publish error");
            },
          };
        }

        function logStartup() {
          var loc = window.location.protocol;
          debugLine(
            "Page: " + loc + "//" + window.location.host + window.location.pathname,
            loc === "file:" ? "warn" : "ok"
          );
          if (loc === "file:")
            debugLine("file:// often blocks or breaks scripts — use Live Server or a real URL.", "warn");
          if (typeof mqtt === "undefined")
            debugLine("mqtt.js failed to load from CDN (check network / adblock).", "err");
          else debugLine("mqtt.js loaded (v5 browser bundle).", "ok");
          debugLine("Using built-in MQTEST credentials (user test2) · topic " + MQTEST.chatTopic, "ok");
        }
        logStartup();

        $("btnClearChat").addEventListener("click", function () {
          chatEl.innerHTML = "";
          appendChat("system", "", "Chat cleared.");
        });

        function doSend() {
          if (!client || !client.connected) {
            debugLine("Send blocked: not connected.", "warn");
            return;
          }
          var topic = MQTEST.chatTopic;
          var payload = composerInput.value;
          if (!payload.trim()) return;

          var bubble = appendOutgoingChat(topic, payload);
          lastSentBody = payload;
          lastSentAt = Date.now();
          composerInput.value = "";

          client.publish(topic, payload, { qos: 1 }, function (err) {
            if (err) {
              debugLine("PUBLISH error: " + errString(err), "err");
              setPill("error", errString(err));
              bubble.setFailed(errString(err));
            } else {
              debugLine("PUBLISH PUBACK ok topic=" + topic + " bytes=" + payload.length, "ok");
              bubble.setDelivered();
            }
          });
        }

        $("btnSend").addEventListener("click", doSend);
        composerInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            doSend();
          }
        });

        function wireClientEvents(topic) {
          client.on("message", function (t, payload, packet) {
            var text = payload.toString();
            if (
              t === topic &&
              text === lastSentBody &&
              Date.now() - lastSentAt < 2500
            ) {
              debugLine("MESSAGE in (own echo, chat shows only your sent bubble + PUBACK)", "ok");
              return;
            }
            var qos = packet && packet.qos != null ? " qos" + packet.qos : "";
            debugLine("MESSAGE in topic=" + t + qos + " len=" + text.length, "ok");
            appendChat("in", "Topic: " + t, text);
          });

          client.on("error", function (err) {
            debugLine("EVENT error: " + errString(err), "err");
            setPill("error", errString(err));
          });

          client.on("close", function () {
            debugLine("EVENT close (TCP/WebSocket closed)", "warn");
            setPill("disconnected", "Connection closed");
            setConnected(false);
            client = null;
          });

          client.on("offline", function () {
            debugLine("EVENT offline", "warn");
          });

          client.on("end", function () {
            debugLine("EVENT end (client ended)", "warn");
          });

          client.on("disconnect", function (packet) {
            debugLine(
              "EVENT disconnect" +
                (packet && packet.reasonCode != null ? " reasonCode=" + packet.reasonCode : ""),
              "warn"
            );
          });
        }

        function connectNow() {
          var url = MQTEST.brokerUrl;
          var username = MQTEST.username;
          var password = MQTEST.password;
          var topic = MQTEST.chatTopic;

          if (typeof mqtt === "undefined") {
            debugLine("Connect aborted: mqtt not loaded.", "err");
            setPill("error", "mqtt.js failed to load");
            return;
          }

          if (client) {
            try {
              client.end(true);
            } catch (e) {}
            client = null;
          }

          clientId = "mqtest-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now();
          setPill("connecting", redactUrl(url) + " · " + username + " · " + topic);
          debugLine("CONNECT attempt → " + redactUrl(url), "ok");
          debugLine('Auth: user "' + username + '"', "ok");

          client = mqtt.connect(url, {
            username: username,
            password: password,
            clientId: clientId,
            clean: true,
            reconnectPeriod: 0,
            keepalive: 60,
            connectTimeout: 30 * 1000,
          });

          client.on("connect", function (connack) {
            setPill("connected", "test2 · " + topic);
            setConnected(true);
            var extra = "";
            if (connack && typeof connack === "object") {
              try {
                extra =
                  " reasonCode=" +
                  connack.reasonCode +
                  " sessionPresent=" +
                  connack.sessionPresent;
              } catch (e) {
                extra = " " + JSON.stringify(connack);
              }
            }
            debugLine("EVENT connect" + extra, "ok");
            appendChat("system", "", "Connected — chat topic: " + topic);

            client.subscribe(topic, { qos: 1 }, function (err, granted) {
              if (err) {
                debugLine("SUBSCRIBE error: " + errString(err), "err");
                setPill("error", errString(err));
              } else {
                debugLine("SUBSCRIBE ok: " + JSON.stringify(granted), "ok");
              }
            });
          });

          wireClientEvents(topic);
        }

        $("btnReconnect").addEventListener("click", function () {
          debugLine("Manual reconnect.", "ok");
          connectNow();
        });

        appendChat(
          "system",
          "",
          "Connecting automatically… Your messages show on the right with a delivery check after the broker ACKs."
        );
        connectNow();
      })();
    </script>
  </body>
</html>
