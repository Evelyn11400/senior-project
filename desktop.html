<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blackout Reboot — Desktop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page-desktop">
    <div class="dashboard">
      <div class="desktop" data-node-id="10:2" aria-label="Blackout Reboot desktop">
        <section class="dashboard__top" aria-label="Blackout Reboot map">
          <div
            class="mqtt-status-pill mqtt-status-pill--connecting"
            id="mqtt-status-pill"
            role="status"
            aria-live="polite"
          >
            <span class="mqtt-status-pill__dot" aria-hidden="true"></span>
            <span class="mqtt-status-pill__label" id="mqtt-status-pill-label">Connecting…</span>
          </div>
          <div class="dashboard__map">
            <!-- Raster is embedded inside map-embedded.svg (pattern + base64 PNG); avoids broken remote asset / layering issues -->
            <img
              src="/map-embedded.svg"
              alt=""
              width="1474"
              height="1024"
            />
            <svg
              class="dashboard__map-overlay"
              viewBox="0 0 1474 1024"
              preserveAspectRatio="xMidYMid slice"
              aria-hidden="true"
              focusable="false"
              fill="none"
            >
              <g id="map-markers"></g>
            </svg>
          </div>

          <div class="dashboard__title">
            <div class="dashboard__title-dots" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <p class="dashboard__title-main">Blackout</p>
            <p class="dashboard__title-sub">Reboot</p>
            <div class="dashboard__title-mark" aria-hidden="true">
              <span class="dashboard__title-diamond"></span>
              <span class="dashboard__title-rule"></span>
            </div>
          </div>

          <div class="dashboard__stats" aria-label="Blackout statistics">
            <article class="stat-card">
              <div class="stat-card__inner">
                <span class="stat-card__label">Blackout Rate</span>
                <p class="stat-card__value">
                  <span class="stat-card__number">67</span><span class="stat-card__unit">%</span>
                </p>
              </div>
            </article>
            <article class="stat-card">
              <div class="stat-card__inner">
                <span class="stat-card__label">Blackout Rate</span>
                <p class="stat-card__value">
                  <span class="stat-card__number">67</span><span class="stat-card__unit">%</span>
                </p>
              </div>
            </article>
            <article class="stat-card">
              <div class="stat-card__inner">
                <span class="stat-card__label">Blackout Rate</span>
                <p class="stat-card__value">
                  <span class="stat-card__number">67</span><span class="stat-card__unit">%</span>
                </p>
              </div>
            </article>
            <article class="stat-card">
              <div class="stat-card__inner">
                <span class="stat-card__label">Blackout Rate</span>
                <p class="stat-card__value">
                  <span class="stat-card__number">67</span><span class="stat-card__unit">%</span>
                </p>
              </div>
            </article>
          </div>

          <div class="dashboard__legend">
            <span class="dashboard__legend-swatch" aria-hidden="true"></span>
            <span class="dashboard__legend-label">AECD devices</span>
          </div>
        </section>

        <section class="dashboard__bottom" aria-label="Detail panels">
          <div class="dashboard__bottom-inner">
            <div class="dashboard__bottom-panel dashboard__bottom-panel--names" aria-live="polite">
              <div class="dashboard__names-label">Names from mobile</div>
              <pre class="dashboard__names-list" id="desktop-names-list"></pre>
            </div>
            <div class="dashboard__bottom-panel"></div>
            <div class="dashboard__bottom-panel"></div>
          </div>
        </section>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/mqtt@5.10.3/dist/mqtt.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="/mqtt-config.js"></script>
    <script src="/hivemq-client.js"></script>
    <script>
      (function () {
        var mqttPill = document.getElementById("mqtt-status-pill");
        var mqttPillLabel = document.getElementById("mqtt-status-pill-label");
        function setMqttPill(state, message) {
          if (!mqttPill || !mqttPillLabel) return;
          var labels = {
            connecting: "Connecting…",
            connected: "Connected",
            disconnected: "Disconnected",
            error: "Error",
            unavailable: "MQTT unavailable",
          };
          mqttPill.className = "mqtt-status-pill mqtt-status-pill--" + state;
          mqttPillLabel.textContent = labels[state] || state;
          mqttPill.title =
            message && (state === "error" || state === "unavailable") ? message : "";
        }
        window.addEventListener("blackout-mqtt-status", function (ev) {
          var d = ev.detail || {};
          setMqttPill(d.state || "disconnected", d.message);
        });

        var el = document.getElementById("desktop-names-list");
        if (!el) return;

        var names = [];

        function render() {
          el.textContent = names.length ? names.join("\n") : "—";
        }

        function payloadToUtf8(payload) {
          if (payload == null) return "";
          if (typeof payload === "string") return payload;
          if (payload instanceof ArrayBuffer) {
            return new TextDecoder("utf-8").decode(new Uint8Array(payload));
          }
          if (payload instanceof Uint8Array) {
            return new TextDecoder("utf-8").decode(payload);
          }
          if (typeof payload.toString === "function") {
            var s = payload.toString();
            if (s.indexOf(",") === -1 || !/^\d/.test(s)) return s;
          }
          try {
            return new TextDecoder("utf-8").decode(new Uint8Array(payload));
          } catch (e) {
            return String(payload);
          }
        }

        function parseNameFromPayload(payload) {
          var text = payloadToUtf8(payload);
          var name = text.trim();
          try {
            var o = JSON.parse(text);
            if (o && typeof o.name === "string") name = o.name.trim();
          } catch (e) {}
          return name;
        }

        if (typeof mqtt === "undefined") {
          setMqttPill("unavailable", "mqtt.js not loaded");
          el.textContent =
            "无法加载 MQTT 库。请用 http(s) 打开本页，并检查网络能否访问 CDN。";
          return;
        }

        var B = window.BlackoutMQTT;
        if (!B || !B.client) {
          setMqttPill("unavailable", "MQTT client not created");
          el.textContent =
            "MQTT 未初始化（请用 https 打开并检查网络）。桌面与手机共用 HiveMQ WebSocket。";
          return;
        }

        var topic = window.BLACKOUT_MQTT_NAME_TOPIC || "blackout/reboot/names";
        var buildTopic = window.BLACKOUT_BUILD_TOPIC || "blackout/reboot/build";
        var client = B.client;
        var markersG = document.getElementById("map-markers");

        el.textContent = "正在连接 HiveMQ…";

        /**
         * Land / buildable regions in the same coordinate system as the overlay SVG
         * (viewBox 0 0 1474 1024). Trace outlines in Figma/Illustrator or sample from
         * GeoJSON projected to this space, then paste vertices here. Each polygon is
         * a closed ring (first point need not repeat last). Empty = random anywhere
         * in the padded viewBox (old behavior).
         */
        var BUILDABLE_POLYGONS = [
          // Example (replace with your real outline):
          // [{ x: 400, y: 300 }, { x: 900, y: 280 }, { x: 950, y: 600 }, { x: 350, y: 620 }],
        ];

        function pointInPolygon(x, y, poly) {
          if (!poly || poly.length < 3) return false;
          var inside = false;
          for (var i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            var xi = poly[i].x;
            var yi = poly[i].y;
            var xj = poly[j].x;
            var yj = poly[j].y;
            var denom = yj - yi;
            if (denom === 0) denom = 1e-12;
            var intersect =
              yi > y !== yj > y && x < ((xj - xi) * (y - yi)) / denom + xi;
            if (intersect) inside = !inside;
          }
          return inside;
        }

        function pointInBuildableArea(x, y) {
          if (!BUILDABLE_POLYGONS.length) return true;
          for (var p = 0; p < BUILDABLE_POLYGONS.length; p++) {
            if (pointInPolygon(x, y, BUILDABLE_POLYGONS[p])) return true;
          }
          return false;
        }

        function randomPointInBuildableArea(margin, maxX, maxY) {
          var x;
          var y;
          var tries = 0;
          var cap = 120;
          do {
            x = margin + Math.random() * (maxX - margin);
            y = margin + Math.random() * (maxY - margin);
            tries++;
          } while (!pointInBuildableArea(x, y) && tries < cap);
          return { x: x, y: y };
        }

        function addBuildMarkerDot(payload) {
          if (!markersG) return;
          var margin = 48;
          var maxX = 1474 - margin;
          var maxY = 1024 - margin;
          var x;
          var y;
          try {
            var o = JSON.parse(payloadToUtf8(payload));
            if (
              o &&
              typeof o.x === "number" &&
              typeof o.y === "number" &&
              isFinite(o.x) &&
              isFinite(o.y)
            ) {
              x = Math.max(margin, Math.min(maxX, o.x));
              y = Math.max(margin, Math.min(maxY, o.y));
            }
          } catch (e) {}
          if (x == null) {
            var pt = randomPointInBuildableArea(margin, maxX, maxY);
            x = pt.x;
            y = pt.y;
          }
          var c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          c.setAttribute("cx", String(x));
          c.setAttribute("cy", String(y));
          c.setAttribute("r", "7");
          c.setAttribute("fill", "#F69E7B");
          markersG.appendChild(c);
        }

        function onBrokerConnect() {
          B.subscribe(topic, function (err) {
            if (err) console.error("[desktop] subscribe names:", err);
          });
          B.subscribe(buildTopic, function (err) {
            if (err) console.error("[desktop] subscribe build:", err);
          });
          render();
        }

        window.addEventListener("blackout-mqtt-connect", onBrokerConnect);
        if (B.connected) onBrokerConnect();

        client.on("message", function (recvTopic, payload) {
          if (recvTopic === buildTopic) {
            addBuildMarkerDot(payload);
            return;
          }
          if (recvTopic !== topic) return;
          var name = parseNameFromPayload(payload);
          if (!name) return;
          names.push(name);
          render();
        });
      })();
    </script>
  </body>
</html>
