    <script>
      (function () {
        var chip = document.getElementById("desktop-user-chip");
        var chipName = document.getElementById("desktop-user-chip-name");
        var chipAv = document.getElementById("desktop-user-chip-avatar");
        if (!chip || !chipName || !chipAv) return;

        function getStoredName() {
          try {
            return (localStorage.getItem("blackout-reboot-name") || "").trim();
          } catch (e) {
            return "";
          }
        }

        function initialFromName(n) {
          var s = (n || "").trim();
          if (!s) return "?";
          var c = s.codePointAt(0);
          return c != null ? String.fromCodePoint(c).toUpperCase() : "?";
        }

        function syncDesktopUserChip() {
          var n = getStoredName();
          if (!n) {
            chip.hidden = true;
            return;
          }
          chip.hidden = false;
          chipName.textContent = n;
          chipAv.textContent = initialFromName(n);
        }

        window.addEventListener("storage", function (ev) {
          if (ev.key === "blackout-reboot-name") syncDesktopUserChip();
        });
        syncDesktopUserChip();
      })();
    </script>
    <script>
      (function () {
        var mqttPill = document.getElementById("mqtt-status-pill");
        var mqttPillLabel = document.getElementById("mqtt-status-pill-label");
        function setMqttPill(state, message) {
          if (!mqttPill || !mqttPillLabel) return;
          var labels = {
            connecting: "Connecting…",
            connected: "Connected",
            disconnected: "Disconnected",
            error: "Error",
            unavailable: "MQTT unavailable",
          };
          mqttPill.className = "mqtt-status-pill mqtt-status-pill--" + state;
          mqttPillLabel.textContent = labels[state] || state;
          mqttPill.title =
            message && (state === "error" || state === "unavailable") ? message : "";
        }
        window.addEventListener("blackout-mqtt-status", function (ev) {
          var d = ev.detail || {};
          setMqttPill(d.state || "disconnected", d.message);
        });

        var el = document.getElementById("desktop-names-list");
        if (!el) return;

        var names = [];

        function displayNameForList(n) {
          var t = String(n || "").trim();
          if (!t) return "";
          if (t.length > 20) return t.slice(0, 17) + "…";
          return t;
        }

        function render() {
          if (!names.length) {
            el.textContent = "—";
            return;
          }
          el.textContent = names.map(displayNameForList).join(" · ");
        }

        function payloadToUtf8(payload) {
          if (payload == null) return "";
          if (typeof payload === "string") return payload;
          if (payload instanceof ArrayBuffer) {
            return new TextDecoder("utf-8").decode(new Uint8Array(payload));
          }
          if (payload instanceof Uint8Array) {
            return new TextDecoder("utf-8").decode(payload);
          }
          if (typeof payload.toString === "function") {
            var s = payload.toString();
            if (s.indexOf(",") === -1 || !/^\d/.test(s)) return s;
          }
          try {
            return new TextDecoder("utf-8").decode(new Uint8Array(payload));
          } catch (e) {
            return String(payload);
          }
        }

        function parseNameFromPayload(payload) {
          var text = payloadToUtf8(payload);
          var name = text.trim();
          try {
            var o = JSON.parse(text);
            if (o && typeof o.name === "string") name = o.name.trim();
          } catch (e) {}
          return name;
        }

        function parseStationOwnerFromBuildPayload(payload) {
          var text = payloadToUtf8(payload);
          try {
            var o = JSON.parse(text);
            if (o && typeof o.name === "string" && o.name.trim())
              return o.name.trim();
          } catch (e) {}
          return "";
        }

        function stationLabelText(owner) {
          var base = (owner || "").trim() || "Someone";
          if (base.length > 32) base = base.slice(0, 29) + "…";
          return base;
        }

        if (typeof mqtt === "undefined") {
          setMqttPill("unavailable", "mqtt.js not loaded");
          el.textContent =
            "Can't load MQTT";
          return;
        }

        var B = window.BlackoutMQTT;
        if (!B || !B.client) {
          setMqttPill("unavailable", "MQTT client not created");
          el.textContent =
            "MQTT not initialized";
          return;
        }

        var topic = window.BLACKOUT_MQTT_NAME_TOPIC || "blackout/reboot/names";
        var buildTopic = window.BLACKOUT_BUILD_TOPIC || "blackout/reboot/build";
        var repairTopic = window.BLACKOUT_REPAIR_TOPIC || "blackout/reboot/repair";
        var stationsTopic = window.BLACKOUT_STATIONS_TOPIC || "blackout/reboot/stations";
        var client = B.client;
        var markersG = document.getElementById("map-markers");
        var stationEntries = [];
        var buildRegionPath = document.getElementById("map-build-region");
        var statBlackoutA = document.getElementById("desktop-stat-blackout-rate-a");
        var statTotalElectricity = document.getElementById("desktop-stat-total-electricity");
        var statActiveStations = document.getElementById("desktop-stat-active-stations");
        var statStationsNeedRepair = document.getElementById(
          "desktop-stat-stations-need-repair"
        );

        var LS_BLACKOUT_RATE = "blackout-reboot-blackout-rate";
        var LS_BLACKOUT_RATE_LAST_TS = "blackout-reboot-blackout-rate-last-ts";
        var TWO_HOURS_MS = 2 * 60 * 60 * 1000;
        var BLACKOUT_TOPIC = "blackout/reboot/blackout-rate";

        var ENERGY_TOPIC = "blackout/reboot/energy";
        var LS_TOTAL_KWH = "blackout-reboot-total-kwh";
        var LS_TOTAL_KWH_LAST_TS = "blackout-reboot-total-kwh-last-ts";
        var ONE_HOUR_MS = 60 * 60 * 1000;
        var KWH_PER_HOUR_AT_FULL = 10;
        var KWH_COST_PER_REPAIR = 0.1;

        var MAINTENANCE_DECAY_MS = 40 * 60 * 1000;
        /** After build/repair, stay at 100% briefly, then linear decay to 0% over MAINTENANCE_DECAY_MS. */
        var MAINTENANCE_PLATEAU_MS = 250;

        function newStationId() {
          if (typeof crypto !== "undefined" && crypto.randomUUID) {
            try {
              return crypto.randomUUID();
            } catch (e0) {}
          }
          return "s-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
        }

        function maintenancePercentFromBuiltAt(builtAt) {
          var elapsed = Date.now() - builtAt;
          if (elapsed <= 0) return 100;
          if (elapsed <= MAINTENANCE_PLATEAU_MS) return 100;
          var decayElapsed = elapsed - MAINTENANCE_PLATEAU_MS;
          var m = 100 * (1 - decayElapsed / MAINTENANCE_DECAY_MS);
          return Math.max(0, Math.min(100, m));
        }

        /** Integer percent for map label: compare bounds, truncate (no Math.round). */
        function maintenancePctLabel(p) {
          if (!(typeof p === "number") || !isFinite(p)) return "0%";
          if (p >= 100) return "100%";
          if (p <= 0) return "0%";
          return String(p | 0) + "%";
        }

        function markerPaletteForPct(pct) {
          if (pct >= 70 - 1e-9) {
            return { dot: "#43d17a", text: "#43d17a" };
          }
          if (pct < 30 - 1e-9) {
            return { dot: "#ff4d4d", text: "#ff4d4d" };
          }
          return { dot: "#F69E7B", text: null };
        }

        function highlightStationById(stationId) {
          var sid = (stationId || "").trim();
          if (!sid) return;
          for (var i = 0; i < stationEntries.length; i++) {
            var st = stationEntries[i];
            if (!st || st.id !== sid || !st.gEl) continue;
            st.gEl.classList.remove("map-marker-group--highlight");
            // Force restart transition.
            void st.gEl.getBoundingClientRect();
            st.gEl.classList.add("map-marker-group--highlight");
            try {
              if (st.gEl.__highlightTimer) clearTimeout(st.gEl.__highlightTimer);
            } catch (e0) {}
            st.gEl.__highlightTimer = setTimeout(function () {
              try {
                st.gEl.classList.remove("map-marker-group--highlight");
              } catch (e1) {}
              try {
                st.gEl.__highlightTimer = 0;
              } catch (e2) {}
            }, 30000);
            return;
          }
        }

        /** +5% per repair; if already >= 95%, one repair sets to 100%. */
        function maintenancePercentAfterRepair(cur) {
          if (cur >= 100 - 1e-9) return cur;
          if (cur >= 95 - 1e-9) return 100;
          return Math.min(100, cur + 5);
        }

        function publishStationsSnapshot() {
          if (!B || typeof B.publish !== "function") return;
          var list = stationEntries.map(function (s) {
            return { id: s.id, name: s.owner || "", builtAt: s.builtAt };
          });
          try {
            B.publish(
              stationsTopic,
              JSON.stringify({ v: 1, stations: list }),
              { qos: 1, retain: true }
            );
          } catch (ePub) {}
        }

        function updateAllMarkerHealthText() {
          var now = Date.now();
          var needRepair = 0;
          var factorSum = 0;
          for (var i = 0; i < stationEntries.length; i++) {
            var s = stationEntries[i];
            if (!s.pctEl) continue;
            var pct = maintenancePercentFromBuiltAt(s.builtAt);
            s.pctEl.textContent = maintenancePctLabel(pct);
            var pal = markerPaletteForPct(pct);
            if (s.dotEl && pal.dot) s.dotEl.setAttribute("fill", pal.dot);
            if (s.labelEl) s.labelEl.setAttribute("fill", pal.text || "#f4f4f5");
            if (s.pctEl) s.pctEl.setAttribute("fill", pal.text || "#c8f7c4");
            if (pct < 90 - 1e-6) needRepair++;
            factorSum += Math.max(0, Math.min(1, pct / 100));
          }
          if (statActiveStations)
            statActiveStations.textContent = String(stationEntries.length);
          if (statStationsNeedRepair)
            statStationsNeedRepair.textContent = String(needRepair);

          // Total electricity (kWh):
          // Each station at 100% maintenance generates 10 kWh per hour.
          // Contribution scales linearly with current maintenance percent.
          // Each successful repair consumes 0.1 kWh (charged at repair event).
          try {
            var lastKwhTs = parseFloat(localStorage.getItem(LS_TOTAL_KWH_LAST_TS) || "");
            var totalKwh = parseFloat(localStorage.getItem(LS_TOTAL_KWH) || "");
            if (!isFinite(totalKwh)) totalKwh = 0;
            if (!isFinite(lastKwhTs)) lastKwhTs = now;
            var dtKwh = now - lastKwhTs;
            if (!isFinite(dtKwh) || dtKwh < 0) dtKwh = 0;
            var gen = (dtKwh / ONE_HOUR_MS) * factorSum * KWH_PER_HOUR_AT_FULL;
            var nextKwh = Math.max(0, totalKwh + gen);
            localStorage.setItem(LS_TOTAL_KWH, String(nextKwh));
            localStorage.setItem(LS_TOTAL_KWH_LAST_TS, String(now));
            if (statTotalElectricity) statTotalElectricity.textContent = nextKwh.toFixed(1);
            try {
              if (B && typeof B.publish === "function") {
                B.publish(
                  ENERGY_TOPIC,
                  JSON.stringify({ v: 1, totalKwh: nextKwh, t: now }),
                  { qos: 1, retain: true }
                );
              }
            } catch (ePubE) {}
          } catch (eKwh) {}

          // Blackout rate algorithm:
          // Start at 100%. Each full (100%) station reduces 1% per 2 hours.
          // Contribution scales linearly with current maintenance percent.
          // Persist rate and last tick timestamp so it keeps decreasing over time.
          try {
            var lastTs = parseFloat(localStorage.getItem(LS_BLACKOUT_RATE_LAST_TS) || "");
            var curRate = parseFloat(localStorage.getItem(LS_BLACKOUT_RATE) || "");
            if (!isFinite(curRate)) curRate = 100;
            if (!isFinite(lastTs)) lastTs = now;
            var dt = now - lastTs;
            if (!isFinite(dt) || dt < 0) dt = 0;
            var dec = (dt / TWO_HOURS_MS) * factorSum * 1.25; // percent points (+25% faster)
            var next = Math.max(0, Math.min(100, curRate - dec));
            localStorage.setItem(LS_BLACKOUT_RATE, String(next));
            localStorage.setItem(LS_BLACKOUT_RATE_LAST_TS, String(now));
            var disp = String(Math.max(0, Math.min(100, Math.round(next))));
            if (statBlackoutA) statBlackoutA.textContent = disp;
            try {
              if (B && typeof B.publish === "function") {
                B.publish(
                  BLACKOUT_TOPIC,
                  JSON.stringify({ v: 1, rate: next, t: now }),
                  { qos: 1, retain: true }
                );
              }
            } catch (ePubBR) {}
          } catch (eBR) {}
        }

        function currentTotalKwh() {
          try {
            var v = parseFloat(localStorage.getItem(LS_TOTAL_KWH) || "");
            return isFinite(v) ? v : 0;
          } catch (e) {
            return 0;
          }
        }

        function canAffordRepairCost() {
          return currentTotalKwh() >= KWH_COST_PER_REPAIR - 1e-9;
        }

        function chargeRepairEnergyCost() {
          var now = Date.now();
          try {
            var totalKwh = currentTotalKwh();
            var next = Math.max(0, totalKwh - KWH_COST_PER_REPAIR);
            localStorage.setItem(LS_TOTAL_KWH, String(next));
            localStorage.setItem(LS_TOTAL_KWH_LAST_TS, String(now));
            if (statTotalElectricity) statTotalElectricity.textContent = next.toFixed(1);
            try {
              if (B && typeof B.publish === "function") {
                B.publish(
                  ENERGY_TOPIC,
                  JSON.stringify({ v: 1, totalKwh: next, t: now }),
                  { qos: 1, retain: true }
                );
              }
            } catch (ePubE) {}
          } catch (e0) {}
        }

        function applyRepairByStationId(stationId) {
          var sid = (stationId || "").trim();
          if (!sid) return false;
          for (var i = 0; i < stationEntries.length; i++) {
            if (stationEntries[i].id === sid) {
              var st = stationEntries[i];
              var cur = maintenancePercentFromBuiltAt(st.builtAt);
              if (cur >= 100 - 1e-9) return false;
              var newM = maintenancePercentAfterRepair(cur);
              var now = Date.now();
              st.builtAt =
                now -
                (MAINTENANCE_PLATEAU_MS +
                  ((100 - newM) * MAINTENANCE_DECAY_MS) / 100);
              updateAllMarkerHealthText();
              publishStationsSnapshot();
              highlightStationById(sid);
              return true;
            }
          }
          return false;
        }

        function applyRepairLowestMaintenanceStation() {
          if (!stationEntries.length) return false;
          var bestH = Infinity;
          var ties = [];
          for (var i = 0; i < stationEntries.length; i++) {
            var st = stationEntries[i];
            var cur = maintenancePercentFromBuiltAt(st.builtAt);
            if (cur >= 100 - 1e-9) continue;
            if (cur < bestH - 1e-9) {
              bestH = cur;
              ties = [i];
            } else if (Math.abs(cur - bestH) <= 1e-9) {
              ties.push(i);
            }
          }
          if (!ties.length) return false;
          var pick = ties[Math.floor(Math.random() * ties.length)];
          var st0 = stationEntries[pick];
          var cur0 = maintenancePercentFromBuiltAt(st0.builtAt);
          var newM = maintenancePercentAfterRepair(cur0);
          var now = Date.now();
          st0.builtAt =
            now -
            (MAINTENANCE_PLATEAU_MS +
              ((100 - newM) * MAINTENANCE_DECAY_MS) / 100);
          updateAllMarkerHealthText();
          publishStationsSnapshot();
          highlightStationById(st0.id);
          return true;
        }

        setInterval(updateAllMarkerHealthText, 1000);
        setInterval(publishStationsSnapshot, 8000);

        el.textContent = "Connecting HiveMQ…";

        /** Optional polygon fallback if `#map-build-region` has no usable `d`. */
        var BUILDABLE_POLYGONS = [];

        function pathBuildRegionActive() {
          if (!buildRegionPath) return false;
          var d = (buildRegionPath.getAttribute("d") || "").trim();
          if (d.length < 4) return false;
          try {
            var len = buildRegionPath.getTotalLength();
            if (!isFinite(len) || len <= 0) return false;
          } catch (e) {
            return false;
          }
          return true;
        }

        function pointInPathBuildRegion(x, y) {
          if (!pathBuildRegionActive()) return false;
          try {
            return buildRegionPath.isPointInFill(new DOMPoint(x, y));
          } catch (e) {
            return false;
          }
        }

        function pointInPolygon(x, y, poly) {
          if (!poly || poly.length < 3) return false;
          var inside = false;
          for (var i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            var xi = poly[i].x;
            var yi = poly[i].y;
            var xj = poly[j].x;
            var yj = poly[j].y;
            var denom = yj - yi;
            if (denom === 0) denom = 1e-12;
            var intersect =
              yi > y !== yj > y && x < ((xj - xi) * (y - yi)) / denom + xi;
            if (intersect) inside = !inside;
          }
          return inside;
        }

        function pointInBuildableArea(x, y) {
          if (pointInPathBuildRegion(x, y)) return true;
          if (BUILDABLE_POLYGONS.length) {
            for (var p = 0; p < BUILDABLE_POLYGONS.length; p++) {
              if (pointInPolygon(x, y, BUILDABLE_POLYGONS[p])) return true;
            }
            return false;
          }
          if (pathBuildRegionActive()) return false;
          return true;
        }

        function randomPointInBuildableArea(margin, maxX, maxY) {
          var x;
          var y;
          var tries = 0;
          var cap = 200;
          do {
            x = margin + Math.random() * (maxX - margin);
            y = margin + Math.random() * (maxY - margin);
            tries++;
          } while (!pointInBuildableArea(x, y) && tries < cap);

          if (pointInBuildableArea(x, y)) return { x: x, y: y };

          if (pathBuildRegionActive() && buildRegionPath) {
            try {
              var bb = buildRegionPath.getBBox();
              var k;
              for (k = 0; k < 400; k++) {
                x = bb.x + Math.random() * Math.max(bb.width, 1);
                y = bb.y + Math.random() * Math.max(bb.height, 1);
                if (pointInPathBuildRegion(x, y)) return { x: x, y: y };
              }
            } catch (e2) {}
          }

          return { x: (margin + maxX) * 0.5, y: (margin + maxY) * 0.5 };
        }

        function addBuildMarkerDot(payload) {
          if (!markersG) return;
          var raw = payloadToUtf8(payload);
          var o = null;
          try {
            o = JSON.parse(raw);
          } catch (eParse) {}
          var stationId = "";
          if (o && typeof o.stationId === "string" && o.stationId.trim())
            stationId = o.stationId.trim();
          if (!stationId) stationId = newStationId();
          for (var di = 0; di < stationEntries.length; di++) {
            if (stationEntries[di].id === stationId) return;
          }
          var payloadT =
            o && typeof o.t === "number" && isFinite(o.t) ? o.t : Date.now();
          var builtAt = Math.max(Date.now(), payloadT);

          var margin = 48;
          var maxX = 1474 - margin;
          var maxY = 1024 - margin;
          var x;
          var y;
          try {
            if (
              o &&
              typeof o.x === "number" &&
              typeof o.y === "number" &&
              isFinite(o.x) &&
              isFinite(o.y)
            ) {
              x = Math.max(margin, Math.min(maxX, o.x));
              y = Math.max(margin, Math.min(maxY, o.y));
            }
          } catch (e) {}
          if (x != null && pathBuildRegionActive() && !pointInPathBuildRegion(x, y)) {
            x = null;
          }
          if (x == null) {
            var pt = randomPointInBuildableArea(margin, maxX, maxY);
            x = pt.x;
            y = pt.y;
          }
          var owner = parseStationOwnerFromBuildPayload(payload);
          var labelStr = stationLabelText(owner);
          var r = 3.5;
          var ns = "http://www.w3.org/2000/svg";
          var g = document.createElementNS(ns, "g");
          g.setAttribute("class", "map-marker-group");
          g.setAttribute("data-station-id", stationId);

          var pctEl = document.createElementNS(ns, "text");
          pctEl.setAttribute("class", "map-marker-health");
          pctEl.setAttribute("x", String(x));
          pctEl.setAttribute("y", String(y - r - 22));
          pctEl.setAttribute("text-anchor", "middle");
          pctEl.appendChild(
            document.createTextNode(
              maintenancePctLabel(maintenancePercentFromBuiltAt(builtAt))
            )
          );

          var textEl = document.createElementNS(ns, "text");
          textEl.setAttribute("class", "map-marker-label");
          textEl.setAttribute("x", String(x));
          textEl.setAttribute("y", String(y - r - 6));
          textEl.setAttribute("text-anchor", "middle");
          textEl.appendChild(document.createTextNode(labelStr));
          var c = document.createElementNS(ns, "circle");
          c.setAttribute("cx", String(x));
          c.setAttribute("cy", String(y));
          c.setAttribute("r", String(r));
          c.setAttribute("fill", "#F69E7B");
          g.appendChild(pctEl);
          g.appendChild(textEl);
          g.appendChild(c);
          markersG.appendChild(g);

          stationEntries.push({
            id: stationId,
            owner: owner,
            builtAt: builtAt,
            pctEl: pctEl,
            labelEl: textEl,
            dotEl: c,
            gEl: g,
          });
          updateAllMarkerHealthText();
          highlightStationById(stationId);
          publishStationsSnapshot();
        }

        function onBrokerConnect() {
          B.subscribe(topic, function (err) {
            if (err) console.error("[desktop] subscribe names:", err);
          });
          B.subscribe(buildTopic, function (err) {
            if (err) console.error("[desktop] subscribe build:", err);
          });
          B.subscribe(repairTopic, function (err) {
            if (err) console.error("[desktop] subscribe repair:", err);
          });
          publishStationsSnapshot();
          render();
        }

        window.addEventListener("blackout-mqtt-connect", onBrokerConnect);
        if (B.connected) onBrokerConnect();

        client.on("message", function (recvTopic, payload) {
          if (recvTopic === buildTopic) {
            addBuildMarkerDot(payload);
            return;
          }
          if (recvTopic === repairTopic) {
            try {
              var ro = JSON.parse(payloadToUtf8(payload));
              if (!ro || ro.action !== "repair") return;
              if (!canAffordRepairCost()) return;
              var ok = false;
              if (ro.target === "lowest") ok = applyRepairLowestMaintenanceStation();
              else if (typeof ro.stationId === "string" && ro.stationId.trim())
                ok = applyRepairByStationId(ro.stationId);
              if (ok) chargeRepairEnergyCost();
            } catch (eR) {}
            return;
          }
          if (recvTopic !== topic) return;
          var name = parseNameFromPayload(payload);
          if (!name) return;
          names.push(name);
          render();
        });
      })();
    </script>
  </body>
</html>
