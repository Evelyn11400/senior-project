<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blackout Reboot — Desktop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page-desktop">
    <div class="dashboard">
      <div class="desktop" data-node-id="10:2" aria-label="Blackout Reboot desktop">
        <section class="dashboard__top" aria-label="Blackout Reboot map">
          <div class="dashboard__map">
            <!-- Raster is embedded inside map-embedded.svg (pattern + base64 PNG); avoids broken remote asset / layering issues -->
            <img
              src="/map-embedded.svg"
              alt=""
              width="1474"
              height="1024"
            />
            <svg
              class="dashboard__map-overlay"
              viewBox="0 0 1474 1024"
              preserveAspectRatio="xMidYMid slice"
              aria-hidden="true"
              focusable="false"
              fill="none"
            >
              <g id="map-markers"></g>
            </svg>
          </div>

          <div class="dashboard__title">
            <div class="dashboard__title-dots" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <p class="dashboard__title-main">Blackout</p>
            <p class="dashboard__title-sub">Reboot</p>
            <div class="dashboard__title-mark" aria-hidden="true">
              <span class="dashboard__title-diamond"></span>
              <span class="dashboard__title-rule"></span>
            </div>
          </div>

          <div class="dashboard__stats" aria-label="Blackout statistics">
            <article class="stat-card">
              <div class="stat-card__inner">
                <span class="stat-card__label">Blackout Rate</span>
                <p class="stat-card__value">
                  <span class="stat-card__number">67</span><span class="stat-card__unit">%</span>
                </p>
              </div>
            </article>
            <article class="stat-card">
              <div class="stat-card__inner">
                <span class="stat-card__label">Blackout Rate</span>
                <p class="stat-card__value">
                  <span class="stat-card__number">67</span><span class="stat-card__unit">%</span>
                </p>
              </div>
            </article>
            <article class="stat-card">
              <div class="stat-card__inner">
                <span class="stat-card__label">Blackout Rate</span>
                <p class="stat-card__value">
                  <span class="stat-card__number">67</span><span class="stat-card__unit">%</span>
                </p>
              </div>
            </article>
            <article class="stat-card">
              <div class="stat-card__inner">
                <span class="stat-card__label">Blackout Rate</span>
                <p class="stat-card__value">
                  <span class="stat-card__number">67</span><span class="stat-card__unit">%</span>
                </p>
              </div>
            </article>
          </div>

          <div class="dashboard__legend">
            <span class="dashboard__legend-swatch" aria-hidden="true"></span>
            <span class="dashboard__legend-label">AECD devices</span>
          </div>
        </section>

        <section class="dashboard__bottom" aria-label="Detail panels">
          <div class="dashboard__bottom-inner">
            <div class="dashboard__bottom-panel dashboard__bottom-panel--names" aria-live="polite">
              <div class="dashboard__names-label">Names from mobile</div>
              <pre class="dashboard__names-list" id="desktop-names-list"></pre>
            </div>
            <div class="dashboard__bottom-panel"></div>
            <div class="dashboard__bottom-panel"></div>
          </div>
        </section>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/mqtt@5.10.3/dist/mqtt.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="/mqtt-config.js"></script>
    <script src="/hivemq-client.js"></script>
    <script>
      (function () {
        var el = document.getElementById("desktop-names-list");
        if (!el) return;

        var names = [];

        function render() {
          el.textContent = names.length ? names.join("\n") : "—";
        }

        function payloadToUtf8(payload) {
          if (payload == null) return "";
          if (typeof payload === "string") return payload;
          if (payload instanceof ArrayBuffer) {
            return new TextDecoder("utf-8").decode(new Uint8Array(payload));
          }
          if (payload instanceof Uint8Array) {
            return new TextDecoder("utf-8").decode(payload);
          }
          if (typeof payload.toString === "function") {
            var s = payload.toString();
            if (s.indexOf(",") === -1 || !/^\d/.test(s)) return s;
          }
          try {
            return new TextDecoder("utf-8").decode(new Uint8Array(payload));
          } catch (e) {
            return String(payload);
          }
        }

        function parseNameFromPayload(payload) {
          var text = payloadToUtf8(payload);
          var name = text.trim();
          try {
            var o = JSON.parse(text);
            if (o && typeof o.name === "string") name = o.name.trim();
          } catch (e) {}
          return name;
        }

        if (typeof mqtt === "undefined") {
          el.textContent =
            "无法加载 MQTT 库。请用 http(s) 打开本页，并检查网络能否访问 CDN。";
          return;
        }

        var B = window.BlackoutMQTT;
        if (!B || !B.client) {
          el.textContent =
            "请在 mqtt-config.js 中填写 HiveMQ 用户名和密码（与手机相同）。跨设备只走 MQTT，无本机接口。";
          return;
        }

        var topic = window.BLACKOUT_MQTT_NAME_TOPIC || "blackout/reboot/names";
        var client = B.client;

        el.textContent = "正在连接 HiveMQ…";

        function onBrokerConnect() {
          B.subscribe(topic, function (err) {
            if (err) console.error("[desktop] subscribe:", err);
          });
          render();
        }

        window.addEventListener("blackout-mqtt-connect", onBrokerConnect);
        if (B.connected) onBrokerConnect();

        client.on("message", function (recvTopic, payload) {
          if (recvTopic !== topic) return;
          var name = parseNameFromPayload(payload);
          if (!name) return;
          names.push(name);
          render();
        });
      })();
    </script>
  </body>
</html>
